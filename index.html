<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brad Dollar</title>

<style>
:root{
  --bg:#0e0f11;
  --panel:#16181b;
  --text:#f2f2f2;
  --muted:#9ca3af;
  --lime:#8aff00;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  text-align:center;
  padding:20px;
}

.container{
  max-width:720px;
  width:100%;
}

h1{
  font-size:44px;
  letter-spacing:2px;
  margin:0 0 18px 0;
}

.tagline{
  font-size:18px;
  line-height:1.6;
  color:var(--muted);
  margin-bottom:36px;
}

.button{
  display:inline-block;
  padding:12px 26px;
  border:1px solid var(--lime);
  border-radius:999px;
  color:var(--lime);
  text-decoration:none;
  font-size:15px;
  transition:all .2s ease;
}

.button:hover{
  background:var(--lime);
  color:#111;
}

.footer{
  margin-top:70px;
  font-size:13px;
  opacity:.5;
}

@media (max-width:520px){
  h1{ font-size:34px; }
  .tagline{ font-size:16px; }
}
</style>
</head>

<body>

<div class="container">
  <h1>BRAD DOLLAR</h1>

  <div class="tagline">
    Music producer. Guitarist. Creative operator.<br>
    Building timeless work across recording, songwriting, and artist development.
  </div>

  <a class="button" href="credits.html">View Credits</a>

  <div class="footer">
    © 2026 Brad Dollar
  </div>
</div>

</body>
</html>
