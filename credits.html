<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Credits - Brad Dollar</title>
<style>
  :root {
    --bg: #111;
    --fg: #fff;
    --muted: rgba(255,255,255,0.72);
    --line: rgba(255,255,255,0.16);
    --panel: rgba(255,255,255,0.04);
  }

  body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: var(--bg);
    color: var(--fg);
  }

  .wrap {
    max-width: 980px;
    margin: 0 auto;
    padding: 40px 20px 70px 20px;
  }

  h1 {
    text-align: center;
    font-size: 42px;
    letter-spacing: 2px;
    margin: 0 0 10px 0;
  }

  .sub {
    text-align: center;
    font-size: 14px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 18px;
  }

  .legend {
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 14px;
    color: var(--muted);
    line-height: 1.6;
    margin: 0 auto 18px auto;
    background: var(--panel);
  }

  .sticky {
    position: sticky;
    top: 0;
    z-index: 10;
    background: rgba(17,17,17,0.92);
    backdrop-filter: blur(8px);
    border-top: 1px solid rgba(255,255,255,0.06);
    border-bottom: 1px solid rgba(255,255,255,0.12);
    padding: 10px 0;
    margin: 18px 0 26px 0;
  }

  .yearNav {
    max-width: 980px;
    margin: 0 auto;
    padding: 0 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }

  .yearNav .label {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-right: 6px;
  }

  .yearNav a {
    display: inline-block;
    padding: 6px 10px;
    border: 1px solid var(--line);
    border-radius: 999px;
    text-decoration: none;
    color: var(--fg);
    font-size: 13px;
    background: rgba(255,255,255,0.02);
  }

  .yearNav a:hover {
    background: rgba(255,255,255,0.08);
  }

  .yearBlock {
    padding: 18px 16px;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: rgba(255,255,255,0.02);
    margin-bottom: 18px;
  }

  .yearBlock h2 {
    margin: 0 0 12px 0;
    font-size: 22px;
    border-bottom: 1px solid rgba(255,255,255,0.10);
    padding-bottom: 10px;
    letter-spacing: 1px;
  }

  .credit {
    font-size: 14px;
    line-height: 1.75;
    margin: 0 0 6px 0;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .back {
    text-align: center;
    margin-top: 34px;
    font-size: 14px;
    color: var(--muted);
  }

  .back a {
    color: var(--fg);
    text-decoration: underline;
  }
</style>
</head>
<body>

<div class="wrap">
  <h1>Credits</h1>
  <div class="sub">Full chronological archive</div>

  <div class="legend">
    Legend: p = produce, e = engineer, m = mix, w = write, c = coach, g = guitar
  </div>
</div>

<div class="sticky">
  <div class="yearNav" id="yearNav">
    <span class="label">Jump to year</span>
  </div>
</div>

<div class="wrap">
  <div id="creditsRender"></div>

  <div class="back">
    <a href="index.html">Back to Home</a>
  </div>
</div>

<script>
/*
  Paste your full credits list into CREDITS_TEXT below.
  The script will:
  - Extract [YYYY]
  - Group entries by year
  - Build a sticky year nav
  - Render year sections with anchors
*/

const CREDITS_TEXT = `
Aisha Fukushima - There's A Sky Above Your Roof [2025] (p, e, m)
Songfinch - A Songfinch Christmas [2025] (p, e)
Brad $ - Never The Way It Is (Turnstile x Celine Dion remix) [2025] (p, e, m)
ABBA-CONDA X4XX - Hotel California [2025] (m, e)
Crazyaimone - Sinking In The Floor [2025] (m, e)
ELIXE - ELIXE ep [2025] (c)
ABBA-CONDA X4XX - Ice [2025] (c)
Southside Jake - One of Those Days [2025] (p, m, e)
Real Name - PH2 [2025] (p, e, m, w, g)
Brad $ - Flexcalibur [2025] (p, e, m, w, g)
Earth Laser - Van Halen & Nirvana Are Friends [2025] (e)
Brad $ - Reunion [2025] (p, e, m, w, g)
Ojas Music - All Night [2025] (c)
Timothy Lee - Simple Times [2025] (c)
Pete Osa - Snow Falling [2025] (c)

Dani Stacy - Loveless Man [2024] (p, e, m)
Brad Sample - Time Machine [2024] (p, e, m)
Devin Croda - Midnight Oil [2024] (g, m)
Aisha Fukushima - Morning Light [2024] (p, e, m)
Brad $ - Roughs the Album [2024] (p, e, m, w)
Near Futures - Not the Man [2024] (p, e, m)
Real Name - Gimme More [2024] (p, e, m, w)
Brad $ - Florida!!! (Taylor Swift Remix) [2024] (p, e, m)

Southside Jake - Whiskey Man [2023] (p, e, m, w, g)
Parry Ace - Not Many Days [2023] (m)
Aisha Fukushima - Women's Equality Day [2023] (m)
Kyle Pruzina + ABC - Let's Make A Deal [2023] (e, m)
Laney Lou & the Bird Dogs - Coyote [2023] (p, e)
Rafe Pearlman [2023] (c)
Nehoda - Dissolution [2023] (m)
Sonia Leigh / Gina Venier - St. Valentine [2023] (w)
Nehoda - Good News / End of the World Blues [2023] (m)
Bonner Black / Sonia Leigh - Queen of Swords [2023] (p, e, m, w, g)
Nehoda - Hide Your Ways [2023] (m)
Nehoda - What Would Kurt Do [2023] (m)
Brad $ - Fall In 2 U [2023] (p, e, m, w, g)
Caitlin Cannon - Songfinch tracks [2023] (p, e, m, w, g)
Scott Porter - Songfinch tracks [2023] (p, e, m, w, g)
Songfinch - Songfinch STEM Compilation (59 artists) [2023] (m)

Kim Kylland - Soundtrack for HBO's The Anarchists [2022] (p, e, m, g)
LANN - Like the Rest [2022] (p, e, m)
NHL/Blackhawks Insider - Theme Song [2022] (p, e, m, w)
Brad $ - This Isn't Over (ft. Jay Lane) [2022] (p, e, m, w, g)
Don't Put Her Down: The Life & Songs of Hazel Dickens [2022] (e)
JP Cormier - Alvarez 2023 Promo [2022] (e)
LR Baggs - Trousdale [2022] (e)
LR Baggs - Jesse Daniel [2022] (e)
LR Baggs - Joshua Hedley [2022] (e)
LR Baggs - Drayton Farley [2022] (e)
Brad $ - Blackout (ft. Parry Ace) [2022] (p, e, m, w, g)
LR Baggs - Lore [2022] (e)
Brad $ - 23 [2022] (p, e, m, w, g)
LR Baggs - Among Savages [2022] (e)
Brad $ - Summer Dust [2022] (p, e, m, w, g)
LR Baggs - Tyler Childers [2022] (m)
LANN - Next Girl [2022] (p, e, m)
Near Futures - Orange Sky [2022] (p, e, m)
LR Baggs - Robert Earl Keen [2022] (m)
LR Baggs - Lillie Mae [2022] (e, m)
LR Baggs - Doc Oliver [2022] (e, m)
Brad $ - Waiting On My Angel (Jamie Principle cover) [2022] (e, m)
Brad $ - Head Over Hills (Kate Bush x Tear for Fears Remix) [2022] (p, e, m, g)
Pete Sahaidachny - Voice In Your Heart [2022] (m)
Chris Taylor [2022] (c)
Brad $ - Apparitions [2022] (p, e, m, w, g)
Southside Jake - Get There [2022] (p, e, m, w, g)
Nathan Hartono - There Has Always Been A Story [2022] (p, e, m)
Daphne Suitcase - Even The Angels [2022] (p, e, m)
`;

function extractYear(line) {
  const m = line.match(/\[(\d{4})\]/);
  return m ? m[1] : null;
}

function escapeHTML(s) {
  return s
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;");
}

function build() {
  const raw = CREDITS_TEXT.trim();
  const renderEl = document.getElementById("creditsRender");
  const navEl = document.getElementById("yearNav");

  if (!raw || raw === "PASTE YOUR FULL CREDITS LIST HERE") {
    renderEl.innerHTML = '<div style="color:rgba(255,255,255,0.7);">Paste your credits list into the CREDITS_TEXT block in credits.html, then commit.</div>';
    return;
  }

  const lines = raw.split(/\r?\n/).map(l => l.trim()).filter(Boolean);

  const byYear = new Map();
  let currentYear = null;

  for (const line of lines) {
    const y = extractYear(line);
    if (y) currentYear = y;

    if (!currentYear) continue; // ignore lines before the first [YYYY]
    if (!byYear.has(currentYear)) byYear.set(currentYear, []);
    byYear.get(currentYear).push(line);
  }

  const years = Array.from(byYear.keys()).sort((a,b) => Number(b) - Number(a));

  // Build nav
  const fragNav = document.createDocumentFragment();
  for (const y of years) {
    const a = document.createElement("a");
    a.href = `#y${y}`;
    a.textContent = y;
    fragNav.appendChild(a);
  }
  navEl.appendChild(fragNav);

  // Build sections
  const frag = document.createDocumentFragment();
  for (const y of years) {
    const block = document.createElement("section");
    block.className = "yearBlock";
    block.id = `y${y}`;

    const h2 = document.createElement("h2");
    h2.textContent = y;
    block.appendChild(h2);

    const entries = byYear.get(y) || [];
    for (const entry of entries) {
      const p = document.createElement("div");
      p.className = "credit";
      p.innerHTML = escapeHTML(entry);
      block.appendChild(p);
    }

    frag.appendChild(block);
  }

  renderEl.innerHTML = "";
  renderEl.appendChild(frag);
}

build();
</script>

</body>
</html>
