<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Credits | Brad Dollar</title>

<style>
  body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background-color: #0b0c0f;
    color: #ffffff;
  }

  .container {
    width: 100%;
    max-width: 1020px;
    margin: 0 auto;
    padding: 32px 16px 60px 16px;
  }

  h1 {
    font-size: 52px;
    margin: 0 0 6px 0;
  }

  .subtitle {
    color: rgba(255,255,255,0.65);
    margin-bottom: 18px;
  }

  .legend {
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 18px;
    background: rgba(255,255,255,0.04);
  }

  .year-nav-wrap {
    margin-bottom: 20px;
  }

  .year-nav {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
  }

  .year-btn {
    padding: 6px 12px;
    border-radius: 999px;
    border: 1px solid #7CFF3A;
    color: #7CFF3A;
    text-decoration: none;
    font-size: 14px;
    line-height: 1;
  }

  .year-btn:hover {
    background: rgba(124,255,58,0.12);
  }

  .years {
    display: grid;
    gap: 18px;
  }

  .year-card {
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 18px;
    padding: 18px;
    background: rgba(255,255,255,0.05);
  }

  .year-head {
    text-align: center;
    border-bottom: 1px solid rgba(124,255,58,0.35);
    padding-bottom: 10px;
    margin-bottom: 12px;
  }

  .year-num {
    font-size: 28px;
    color: #7CFF3A;
    font-weight: bold;
  }

  .credit-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  .credit-list li {
    padding: 3px 0;
    font-size: 15px;
  }

  .home-btn {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 10;
  }

  .home-btn a {
    padding: 8px 14px;
    border-radius: 999px;
    border: 1px solid #7CFF3A;
    color: #7CFF3A;
    text-decoration: none;
    font-size: 14px;
    background: rgba(11,12,15,0.35);
    backdrop-filter: blur(8px);
  }

  .home-btn a:hover {
    background: rgba(124,255,58,0.12);
  }
</style>
</head>

<body>

<div class="home-btn">
  <a href="index.html">Home</a>
</div>

<div class="container">
  <h1>Credits</h1>
  <div class="subtitle">Full chronological archive</div>

  <div class="legend">
    <strong>Legend:</strong> p = produce, e = engineer, m = mix, w = write, c = coach, g = guitar
  </div>

  <div class="year-nav-wrap">
    <div class="year-nav" id="yearNav"></div>
  </div>

  <div class="years" id="years"></div>
</div>

<script>
/*
Format for credits:
Title [YYYY] (roles)
Blank lines are fine.
*/

const HIGHLIGHTS_TEXT = `
Grateful Dead
Bob Weir
Bill Kreutzmann
Mickey Hart
John Perry Barlow
The National
Furthur
Ratdog
7 Walkers
G-Eazy
Primus
Van Morrison
Journey
Night Ranger
Chickenfoot
Slightly Stoopid
Lukas Nelson
Lukas Nelson & Promise of the Real
John Scofield
Keb Mo
Rodrigo y Gabriela
Mark Hoppus
Father John Misty
Jenny O
Oz Noy
Dave Weckl
George Pajon
Tyler Childers
Robert Earl Keen
Rodney Atkins
Vincent Neil Emerson
Gangstagrass
Lillie Mae
Drayton Farley
Joshua Hedley
Jesse Daniel
Trousdale
Malik Yusef
Parmalee
Bill Walton
Jay Lane
`;

/* PASTE YOUR FULL CREDITS LIST BELOW */
const CREDITS_TEXT = `
PASTE YOUR FULL CREDITS HERE
`;

/* helpers */
function extractYear(line) {
  const m = line.match(/\[(\d{4})\]/);
  return m ? m[1] : null;
}

function normalizeLines(text) {
  return text
    .split(/\r?\n/)
    .map(l => l.trim())
    .filter(Boolean);
}

function addNavPill(navEl, label, href) {
  const a = document.createElement("a");
  a.className = "year-btn";
  a.href = href;
  a.textContent = label;
  navEl.appendChild(a);
}

function addCard(yearsEl, id, headerText, lines) {
  const card = document.createElement("section");
  card.className = "year-card";
  card.id = id;

  const head = document.createElement("div");
  head.className = "year-head";

  const num = document.createElement("div");
  num.className = "year-num";
  num.textContent = headerText;

  head.appendChild(num);
  card.appendChild(head);

  const ul = document.createElement("ul");
  ul.className = "credit-list";

  for (const entry of lines) {
    const li = document.createElement("li");
    li.textContent = entry;
    ul.appendChild(li);
  }

  card.appendChild(ul);
  yearsEl.appendChild(card);
}

function buildCredits() {
  const navEl = document.getElementById("yearNav");
  const yearsEl = document.getElementById("years");

  navEl.innerHTML = "";
  yearsEl.innerHTML = "";

  /* Highlights first */
  const highlightLines = normalizeLines(HIGHLIGHTS_TEXT);
  if (highlightLines.length) {
    addNavPill(navEl, "Highlights", "#highlights");
    addCard(yearsEl, "highlights", "Studio Highlights", highlightLines);
  }

  /* Parse credits by year */
  const lines = normalizeLines(CREDITS_TEXT);
  const byYear = new Map();

  for (const line of lines) {
    const y = extractYear(line);
    if (!y) continue;
    if (!byYear.has(y)) byYear.set(y, []);
    byYear.get(y).push(line);
  }

  const years = Array.from(byYear.keys()).sort((a, b) => Number(b) - Number(a));

  /* Year pills */
  for (const y of years) {
    addNavPill(navEl, y, `#y${y}`);
  }

  /* Year cards */
  for (const y of years) {
    addCard(yearsEl, `y${y}`, y, byYear.get(y));
  }
}

buildCredits();
</script>

</body>
</html>
