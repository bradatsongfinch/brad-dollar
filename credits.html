function extractYear(line) {
  const m = line.match(/\[(\d{4})\]/);
  return m ? m[1] : null;
}

function buildCredits() {
  const navEl = document.getElementById("yearNav");
  const yearsEl = document.getElementById("years");

  navEl.innerHTML = "";
  yearsEl.innerHTML = "";

  const lines = CREDITS_TEXT
    .split(/\r?\n/)
    .map(l => l.trim())
    .filter(Boolean);

  const byYear = new Map();

  for (const line of lines) {
    const y = extractYear(line);
    if (!y) continue;
    if (!byYear.has(y)) byYear.set(y, []);
    byYear.get(y).push(line);
  }

  const years = Array.from(byYear.keys()).sort((a, b) => Number(b) - Number(a));

  // Year pills
  for (const y of years) {
    const a = document.createElement("a");
    a.className = "year-btn";
    a.href = `#y${y}`;
    a.textContent = y;
    navEl.appendChild(a);
  }

  // Year cards
  for (const y of years) {
    const card = document.createElement("section");
    card.className = "year-card";
    card.id = `y${y}`;

    const head = document.createElement("div");
    head.className = "year-head";

    const num = document.createElement("div");
    num.className = "year-num";
    num.textContent = y;

    head.appendChild(num);
    card.appendChild(head);

    const ul = document.createElement("ul");
    ul.className = "credit-list";

    for (const entry of byYear.get(y)) {
      const li = document.createElement("li");
      li.textContent = entry;
      ul.appendChild(li);
    }

    card.appendChild(ul);
    yearsEl.appendChild(card);
  }
}

buildCredits();
